# ─────────────────────────────────────────────
#  adamleibler.com — Jekyll Configuration
# ─────────────────────────────────────────────

# Site metadata
title: Adam Leibler
tagline: Senior Learning Experience Designer
description: >
  15+ years building high-fidelity, multimedia-rich learning for federal agencies,
  Fortune 500 companies, and global tech teams.
url: "https://adamleibler.com"
baseurl: ""
author:
  name: Adam Leibler
  email: adam@adamleibler.com

# Social (used in SEO meta tags)
social:
  linkedin: adamleibler
  github:   adamleibler
  twitter:  adamleibler
  twitch:   malforthewin

# ─── Build settings ───────────────────────────
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  hard_wrap: false

# ─── Collections ──────────────────────────────
collections:
  case_studies:
    output: true
    permalink: /work/:name/

# Default front matter for each content type
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      draft: true          # posts default to draft until you explicitly publish
  - scope:
      path: ""
      type: case_studies
    values:
      layout: case-study

# ─── Exclude from build ───────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/
  - vendor/

# ─── Plugins (all included in github-pages gem) ───
plugins:
  - jekyll-feed       # auto-generates /feed.xml RSS
  - jekyll-seo-tag    # injects <meta> SEO tags via {% seo %}
  - jekyll-sitemap    # auto-generates /sitemap.xml
