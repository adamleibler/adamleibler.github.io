# ─────────────────────────────────────────────
#  adamleibler.com — Jekyll Configuration
# ─────────────────────────────────────────────

# Site metadata
title: Adam Leibler
tagline: Senior Learning Experience Designer
description: >
  15+ years building high-fidelity, multimedia-rich learning for federal agencies,
  Fortune 500 companies, and global tech teams.
url: "https://adamleibler.com"
baseurl: ""
author:
  name: Adam Leibler
  email: adam@adamleibler.com

# Social (used in SEO meta tags)
social:
  linkedin: adamleibler
  github:   adamleibler
  twitter:  adamleibler
  twitch:   malforthewin

# ─── Build settings ───────────────────────────
markdown: kramdown
highlighter: rouge
permalink: /blog/:year/:month/:day/:title/

kramdown:
  input: GFM
  hard_wrap: false

# ─── Collections ──────────────────────────────
collections:
  case-studies:
    output: true
    permalink: /work/:name/
  samples:
    output: false
  right-now:
    output: false
  research:
    output: false
  tinkering:
    output: false

# ─── Default front matter ─────────────────────
defaults:

  # Keep all .html pages at their original URL paths
  - scope:
      path: "*.html"
    values:
      permalink: /:path

  # Blog posts default to draft layout
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      draft: true

  # Case studies use the case-study layout
  - scope:
      path: ""
      type: case-studies
    values:
      layout: case-study

# ─── Exclude from build ───────────────────────
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules/
  - vendor/

# ─── Plugins (all included in github-pages gem) ───
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
