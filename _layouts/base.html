<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>
    {%- if page.title -%}
      {{ page.title }} — {{ site.title }}
    {%- else -%}
      {{ site.title }} — {{ site.tagline }}
    {%- endif -%}
  </title>

  {% seo %}

  <!-- Google Fonts — matches your existing pages -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}" />


</head>
<body>

  <!-- ── NAVIGATION ── -->
  <nav>
    <div class="nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-logo" aria-label="Adam Leibler — home">Adam Leibler</a>
      <ul class="nav-links" role="list">
        <li><a href="{{ '/' | relative_url }}#about">About</a></li>
        <li><a href="{{ '/work.html' | relative_url }}"
               {% if page.url contains '/work' %}aria-current="page"{% endif %}>Work</a></li>
        <li><a href="{{ '/craft.html' | relative_url }}"
               {% if page.url contains '/craft' %}aria-current="page"{% endif %}>Craft</a></li>
        <li><a href="{{ '/lab.html' | relative_url }}"
               {% if page.url contains '/lab' %}aria-current="page"{% endif %}>The Lab</a></li>
        <li><a href="{{ '/resume.html' | relative_url }}"
               {% if page.url contains '/resume' %}aria-current="page"{% endif %}>Resume</a></li>
      </ul>
      <a href="{{ '/' | relative_url }}#contact" class="btn-slate" id="nav-contact-desktop">Contact Me</a>
      <button class="nav-toggle" aria-label="Open navigation menu" aria-expanded="false" id="nav-toggle">
        <span></span><span></span><span></span>
      </button>
    </div>
    <div class="nav-mobile-menu" id="nav-mobile-menu" role="navigation" aria-label="Mobile navigation">
      <a href="{{ '/' | relative_url }}#about" class="mobile-link">About</a>
      <a href="{{ '/work.html' | relative_url }}" class="mobile-link">Work</a>
      <a href="{{ '/craft.html' | relative_url }}" class="mobile-link">Craft</a>
      <a href="{{ '/lab.html' | relative_url }}" class="mobile-link">The Lab</a>
      <a href="{{ '/resume.html' | relative_url }}" class="mobile-link">Resume</a>
      <a href="{{ '/' | relative_url }}#contact" class="btn-slate mobile-link">Contact Me</a>
    </div>
  </nav>

  <!-- ── PAGE CONTENT ───────────────────────────────────────────────────── -->
  <main>
    {{ content }}
  </main>

  <!-- ── FOOTER ── -->
  <footer role="contentinfo">
    <div class="footer-main">
      <span class="text-muted">&copy; {{ site.time | date: "%Y" }} Adam Leibler &mdash; Built with intention.</span>
      <nav class="footer-links" aria-label="Social links">
        <a href="https://linkedin.com/in/{{ site.social.linkedin }}" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        <a href="https://github.com/{{ site.social.github }}" target="_blank" rel="noopener noreferrer">GitHub</a>
        <a href="https://x.com/{{ site.social.twitter }}" target="_blank" rel="noopener noreferrer">X</a>
        <a href="https://twitch.tv/{{ site.social.twitch }}" target="_blank" rel="noopener noreferrer">Twitch</a>
      </nav>
    </div>
    <div class="footer-collab">
      <span>Made in collaboration with</span>
      <a href="https://claude.ai" target="_blank" rel="noopener noreferrer"><img src="{{ '/assets/claude-ai-icon.svg' | relative_url }}" alt="Claude AI logo" /></a>
      <a href="https://claude.ai" target="_blank" rel="noopener noreferrer">Claude AI</a>
    </div>
  </footer>

  <script src="{{ '/main.js' | relative_url }}"></script>
</body>
</html>
