<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>
    {%- if page.title -%}
      {{ page.title }} — {{ site.title }}
    {%- else -%}
      {{ site.title }} — {{ site.tagline }}
    {%- endif -%}
  </title>

  {% seo %}

  <!-- Google Fonts — matches your existing pages -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ '/style.css' | relative_url }}" />

  <link rel="alternate" type="application/rss+xml"
        title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}" />
</head>
<body>

  <!-- ── NAVIGATION ─────────────────────────────────────────────────────── -->
  <nav>
    <div class="nav-inner">

      <a href="{{ '/' | relative_url }}" class="nav-logo">Adam Leibler</a>

      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}#about">About</a></li>
        <li><a href="{{ '/work.html' | relative_url }}"
               {% if page.url contains '/work' %}aria-current="page"{% endif %}>Work</a></li>
        <li><a href="{{ '/craft.html' | relative_url }}"
               {% if page.url contains '/craft' %}aria-current="page"{% endif %}>Craft</a></li>
        <li><a href="{{ '/lab.html' | relative_url }}"
               {% if page.url contains '/lab' %}aria-current="page"{% endif %}>The Lab</a></li>
        <li><a href="{{ '/resume.html' | relative_url }}"
               {% if page.url contains '/resume' %}aria-current="page"{% endif %}>Resume</a></li>
        <!-- Uncomment once you have posts live:
        <li><a href="{{ '/blog/' | relative_url }}"
               {% if page.url contains '/blog' %}aria-current="page"{% endif %}>Blog</a></li>
        -->
      </ul>

      <a href="{{ '/' | relative_url }}#contact"
         class="btn-slate" id="nav-contact-desktop">Contact Me</a>

      <!-- Hamburger toggle (mobile) -->
      <button class="nav-toggle" aria-label="Toggle navigation" onclick="
        var m = document.querySelector('.nav-mobile-menu');
        m.classList.toggle('open');
      ">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </div>

    <!-- Mobile drawer -->
    <div class="nav-mobile-menu">
      <a href="{{ '/' | relative_url }}#about">About</a>
      <a href="{{ '/work.html' | relative_url }}">Work</a>
      <a href="{{ '/craft.html' | relative_url }}">Craft</a>
      <a href="{{ '/lab.html' | relative_url }}">The Lab</a>
      <a href="{{ '/resume.html' | relative_url }}">Resume</a>
      <!-- <a href="{{ '/blog/' | relative_url }}">Blog</a> -->
      <a href="{{ '/' | relative_url }}#contact" class="btn-slate">Contact Me</a>
    </div>
  </nav>

  <!-- ── PAGE CONTENT ───────────────────────────────────────────────────── -->
  <main>
    {{ content }}
  </main>

  <!-- ── FOOTER ─────────────────────────────────────────────────────────── -->
  <footer>
    <span>© {{ site.time | date: "%Y" }} Adam Leibler — Built with intention.</span>
    <ul class="footer-links">
      <li><a href="https://linkedin.com/in/{{ site.social.linkedin }}" target="_blank" rel="noopener">LinkedIn</a></li>
      <li><a href="https://github.com/{{ site.social.github }}" target="_blank" rel="noopener">GitHub</a></li>
      <li><a href="https://x.com/{{ site.social.twitter }}" target="_blank" rel="noopener">X</a></li>
      <li><a href="https://twitch.tv/{{ site.social.twitch }}" target="_blank" rel="noopener">Twitch</a></li>
    </ul>
  </footer>

</body>
</html>
