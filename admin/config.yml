# ─────────────────────────────────────────────
#  Decap CMS Configuration — adamleibler.com
#  Docs: https://decapcms.org/docs/
# ─────────────────────────────────────────────

backend:
  name: github
  repo: adamleibler/adamleibler.github.io
  branch: main

# Where uploaded images get saved in your repo
media_folder: "assets/uploads"
public_folder: "/assets/uploads"

# ─── Collections ──────────────────────────────────────────────────────────────

collections:

  # ── Case Studies ────────────────────────────────────────────────────────────
  - name: "case_studies"
    label: "Case Studies"
    folder: "_case-studies"
    create: true
    slug: "{{slug}}"
    preview_path: "/work/{{slug}}/"
    summary: "{{title}} — {{client}}"
    sortable_fields: ["order", "title", "client"]
    fields:

      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Project name as it appears on the Work page card."

      - label: "Client / Org"
        name: "client"
        widget: "string"
        hint: "e.g. Twitch / Amazon, U.S. Dept. of Health & Human Services"

      - label: "Sector"
        name: "sector"
        widget: "select"
        options:
          - "Federal Government"
          - "Financial Services"
          - "Technology"
          - "SaaS / Platform"
          - "Field Services"
          - "Defense"
          - "Fortune 500"
          - "Media / Streaming"
        hint: "Used for filtering on the Work page."

      - label: "Modality"
        name: "modality"
        widget: "string"
        hint: "e.g. Game-Based Simulation, AI-Enhanced Multimedia, Technical Onboarding"

      - label: "Availability"
        name: "availability"
        widget: "select"
        options:
          - label: "Full Sample Available"
            value: "Full Sample"
          - label: "Samples on Request"
            value: "On Request"
          - label: "Proprietary"
            value: "Proprietary"
        default: "On Request"

      - label: "Sample URL"
        name: "sample_url"
        widget: "string"
        required: false
        hint: "Only needed if Availability is 'Full Sample'. e.g. /_samples/portfolio-cybersecurity.html"

      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Pin this case study to the top of the Work page."

      - label: "Sort Order"
        name: "order"
        widget: "number"
        default: 99
        value_type: "int"
        hint: "Controls display order. Lower numbers appear first. e.g. 1, 2, 3..."

      - label: "Key Metrics"
        name: "metrics"
        widget: "list"
        required: false
        hint: "Up to 3 stat highlights shown as callout cards."
        fields:
          - label: "Value"
            name: "value"
            widget: "string"
            hint: "e.g. <30 Days, 40%, 10k+"
          - label: "Label"
            name: "label"
            widget: "string"
            hint: "e.g. Time to first contribution, Production timeline reduction"

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Full case study — approach, challenges, outcomes. Proprietary details can be kept vague."

  # ── Interactive Samples ───────────────────────────────────────────────────
  - name: "samples"
    label: "Interactive Samples"
    folder: "_samples"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: ["order", "title"]
    fields:

      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Card heading, e.g. Cybersecurity & Data Privacy — Module 1"

      - label: "Client / Subject"
        name: "client"
        widget: "string"
        hint: "Subtitle shown above the title, e.g. Cybersecurity & Data Privacy"

      - label: "Tag"
        name: "tag"
        widget: "string"
        hint: "Colored label text, e.g. Financial Services · Compliance Training"

      - label: "Tag Color"
        name: "tag_color"
        widget: "select"
        options:
          - label: "Blue"
            value: "blue"
          - label: "Purple"
            value: "purple"
          - label: "Orange"
            value: "orange"
        default: "blue"
        hint: "Color of the tag badge on the card."

      - label: "Sample URL"
        name: "sample_url"
        widget: "string"
        hint: "Link to the live sample, e.g. /_samples/portfolio-cybersecurity.html"

      - label: "Sort Order"
        name: "order"
        widget: "number"
        default: 99
        value_type: "int"
        hint: "Controls display order. Lower numbers appear first."

      - label: "Outcomes"
        name: "outcomes"
        widget: "list"
        hint: "Learning outcomes shown as bullet points on the card."
        field:
          label: "Outcome"
          name: "outcome"
          widget: "string"

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Card description paragraph."

  # ── Right Now (Lab) ──────────────────────────────────────────────────────────
  - name: "right_now"
    label: "Right Now"
    folder: "_right-now"
    create: true
    slug: "{{slug}}"
    summary: "{{category}} — {{title}}"
    sortable_fields: ["order", "title"]
    fields:

      - label: "Title"
        name: "title"
        widget: "string"
        hint: "What you're reading, experimenting with, or studying."

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Reading"
          - "Experimenting"
          - "Studying"
        hint: "Shown as the card label."

      - label: "Sort Order"
        name: "order"
        widget: "number"
        default: 1
        value_type: "int"
        hint: "Controls display order. Lower numbers appear first."

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Brief description of what you're into and why."

  # ── Research & Writing (Lab) ─────────────────────────────────────────────────
  - name: "research"
    label: "Research & Writing"
    folder: "_research"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{status}}"
    sortable_fields: ["order", "title"]
    fields:

      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Research topic or article title."

      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - "Active Research"
          - "Writing"
          - "Thinking"
        hint: "Current stage of this research item."

      - label: "Status CSS Class"
        name: "status_class"
        widget: "select"
        options:
          - label: "Active (green)"
            value: "status-active"
          - label: "Writing (amber)"
            value: "status-writing"
          - label: "Thinking (purple)"
            value: "status-thinking"
        hint: "Visual style for the status badge."

      - label: "Featured"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Show as the main (large) research card. Only one should be featured."

      - label: "Sort Order"
        name: "order"
        widget: "number"
        default: 99
        value_type: "int"
        hint: "Controls display order. Lower numbers appear first."

      - label: "Research Question"
        name: "research_question"
        widget: "text"
        required: false
        hint: "Optional — shown as a highlighted callout on featured items."

      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        allow_add: true
        hint: "Topic tags shown at the bottom of featured items."

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Description of your research or writing."

  # ── Tinkering / Side Projects (Lab) ──────────────────────────────────────────
  - name: "tinkering"
    label: "Side Projects"
    folder: "_tinkering"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{status}}"
    sortable_fields: ["order", "title"]
    fields:

      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Project name."

      - label: "Status"
        name: "status"
        widget: "select"
        options:
          - "Active"
          - "In Progress"
          - "Someday"
        hint: "Current stage of this project."

      - label: "Status CSS Class"
        name: "status_class"
        widget: "select"
        options:
          - label: "Active (green)"
            value: "status-active"
          - label: "In Progress (amber)"
            value: "status-writing"
          - label: "Someday (gray)"
            value: "status-someday"
        hint: "Visual style for the status badge."

      - label: "Sort Order"
        name: "order"
        widget: "number"
        default: 99
        value_type: "int"
        hint: "Controls display order. Lower numbers appear first."

      - label: "Note"
        name: "note"
        widget: "string"
        required: false
        hint: "Footer text — tools used, links, etc. Supports HTML."

      - label: "Note CSS Class"
        name: "note_class"
        widget: "select"
        required: false
        options:
          - label: "Tools (dark)"
            value: "lab-project-note"
          - label: "Link (blue)"
            value: "lab-project-link"
          - label: "Muted (gray)"
            value: "lab-project-muted"
        default: "lab-project-note"
        hint: "Visual style for the footer note."

      - label: "Body"
        name: "body"
        widget: "markdown"
        hint: "Project description."
