<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undrift — Beta Feedback</title>
<script src="../auth.js"></script>
<script>requireAuth();</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0D0F12;--surface:#13161B;--surface2:#1C2028;--border:#252A33;--border2:#2E3440;
    --text:#E8EAF0;--muted:#6B7385;--accent:#1A6BFF;--accent-dim:#1A6BFF18;
    --green:#22C55E;--green-dim:#22C55E15;--amber:#F59E0B;--amber-dim:#F59E0B15;
    --red:#EF4444;--red-dim:#EF444415;--orange:#F97316;--orange-dim:#F9731615;
    --purple:#A78BFA;--purple-dim:#A78BFA15;--cyan:#22D3EE;--cyan-dim:#22D3EE15;
    --radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4}
  .app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 24px}
  header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:16px}
  .header-label{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px}
  .header-label a{color:var(--muted);text-decoration:none}
  .header-label a:hover{color:var(--accent)}
  h1{font-size:26px;font-weight:600;letter-spacing:-0.02em}
  .header-right{display:flex;gap:10px;align-items:center}
  .last-refresh{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
  .refresh-btn{font-family:'DM Mono',monospace;font-size:11px;padding:7px 14px;border-radius:var(--radius);border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px}
  .refresh-btn:hover{border-color:var(--border2);color:var(--text)}
  .spin-icon{display:inline-block}
  .refresh-btn.spinning .spin-icon{animation:spin 0.8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:24px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
  .stat-num{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;line-height:1;margin-bottom:4px}
  .stat-label{font-size:11px;color:var(--muted)}
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .filter-pills{display:flex;gap:6px;flex-wrap:wrap;flex:1}
  .pill{font-family:'DM Mono',monospace;font-size:11px;padding:5px 12px;border-radius:99px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all 0.15s;white-space:nowrap}
  .pill:hover{border-color:var(--border2);color:var(--text)}
  .pill.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
  .pill.p-critical.active{border-color:var(--red);color:var(--red);background:var(--red-dim)}
  .pill.p-high.active{border-color:var(--orange);color:var(--orange);background:var(--orange-dim)}
  .pill.p-medium.active{border-color:var(--amber);color:var(--amber);background:var(--amber-dim)}
  .pill.p-low.active{border-color:var(--muted);color:var(--muted);background:var(--surface2)}
  .search-wrap{position:relative;min-width:200px}
  .search-wrap input{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px 8px 32px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;width:100%;transition:border-color 0.15s}
  .search-wrap input:focus{border-color:var(--accent)}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
  .sort-sel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer;outline:none}
  .sort-sel option{background:var(--surface2)}
  .card-grid{display:flex;flex-direction:column;gap:10px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:all 0.12s}
  .card:hover{border-color:var(--border2);transform:translateY(-1px)}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
  .card-left{flex:1;min-width:0}
  .card-summary{font-weight:500;font-size:14px;margin-bottom:4px;line-height:1.4}
  .card-meta{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap}
  .card-badges{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
  .card-body{font-size:13px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-top:2px}
  .badge{display:inline-flex;align-items:center;font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:99px;border:1px solid;white-space:nowrap}
  .b-bug{color:var(--red);border-color:var(--red);background:var(--red-dim)}
  .b-feature{color:var(--purple);border-color:var(--purple);background:var(--purple-dim)}
  .b-general{color:var(--cyan);border-color:var(--cyan);background:var(--cyan-dim)}
  .b-critical{color:var(--red);border-color:var(--red);background:var(--red-dim)}
  .b-high{color:var(--orange);border-color:var(--orange);background:var(--orange-dim)}
  .b-medium{color:var(--amber);border-color:var(--amber);background:var(--amber-dim)}
  .b-low{color:var(--muted);border-color:var(--border2);background:transparent}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity 0.2s}
  .modal-overlay.open{opacity:1;pointer-events:all}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:100%;max-width:620px;max-height:88vh;overflow-y:auto;transform:translateY(16px);transition:transform 0.2s;box-shadow:0 24px 64px rgba(0,0,0,0.6)}
  .modal-overlay.open .modal{transform:translateY(0)}
  .modal-header{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .modal-title{font-size:15px;font-weight:600;line-height:1.4;flex:1}
  .modal-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
  .modal-body{padding:18px 22px;display:flex;flex-direction:column;gap:14px}
  .modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
  .detail-label{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:5px}
  .detail-value{font-size:13px;color:var(--text);white-space:pre-wrap;line-height:1.6}
  .icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all 0.15s;flex-shrink:0}
  .icon-btn:hover{border-color:var(--border2);color:var(--text)}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.15s;border:none}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
  .btn-ghost:hover{border-color:var(--border2);color:var(--text)}
  .empty-state{text-align:center;padding:56px 24px;color:var(--muted)}
  .empty-icon{font-size:32px;margin-bottom:10px;opacity:0.4}
  .loading{text-align:center;padding:56px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px}
  .error-msg{background:var(--red-dim);border:1px solid var(--red);border-radius:var(--radius);padding:14px 16px;font-size:13px;color:var(--red);margin-bottom:16px;line-height:1.5}
  @media(max-width:640px){.app{padding:20px 16px}h1{font-size:22px}header{flex-direction:column;align-items:flex-start}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="header-label"><a href="../index.html">← tools</a> / undrift</div>
      <h1>Beta feedback</h1>
    </div>
    <div class="header-right">
      <span class="last-refresh" id="lastRefresh"></span>
      <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
        <span class="spin-icon">↻</span> Refresh
      </button>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="sTotal">—</div><div class="stat-label">Total responses</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--red)"    id="sBugs">—</div><div class="stat-label">Bug reports</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--purple)" id="sFeatures">—</div><div class="stat-label">Feature requests</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--cyan)"   id="sGeneral">—</div><div class="stat-label">General feedback</div></div>
    <div class="stat"><div class="stat-num" style="color:var(--red)"    id="sCritical">—</div><div class="stat-label">Critical priority</div></div>
    <div class="stat"><div class="stat-num" id="sNPS">—</div><div class="stat-label">NPS score</div></div>
  </div>

  <div id="errorMsg" class="error-msg" style="display:none"></div>

  <div class="toolbar">
    <div class="filter-pills">
      <button class="pill active" onclick="setFilter('all',this)">All</button>
      <button class="pill p-critical" onclick="setFilter('Critical',this)">● Critical</button>
      <button class="pill p-high"     onclick="setFilter('High',this)">● High</button>
      <button class="pill p-medium"   onclick="setFilter('Medium',this)">● Medium</button>
      <button class="pill p-low"      onclick="setFilter('Low',this)">● Low</button>
      <button class="pill" onclick="setFilter('bug',this)">Bugs</button>
      <button class="pill" onclick="setFilter('feature',this)">Features</button>
      <button class="pill" onclick="setFilter('general',this)">General</button>
    </div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search…" oninput="render()">
    </div>
    <select class="sort-sel" id="sortSel" onchange="render()">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
      <option value="priority">Priority</option>
    </select>
  </div>

  <div class="card-grid" id="cardGrid">
    <div class="loading">Loading feedback from Google Sheets…</div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div style="flex:1">
        <div class="modal-title" id="dTitle"></div>
        <div class="modal-badges" id="dBadges"></div>
      </div>
      <button class="icon-btn" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="dBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDetail()">Close</button>
    </div>
  </div>
</div>

<script>
const SHEET_ID  = '1su7cJqv6KPI8Zy8fLwKd24-vwve2PXchQ-tJ8kpceko';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
const PRIORITY_ORDER = {Critical:0,High:1,Medium:2,Low:3};

let rows = [];
let activeFilter = 'all';

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  hideError();
  document.getElementById('cardGrid').innerHTML = '<div class="loading">Loading…</div>';

  try {
    const res  = await fetch(SHEET_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const dataRows = json.table?.rows || [];
    const cols     = json.table?.cols || [];

    // Build a header map from the actual sheet columns
    const headers = cols.map(c => (c.label || '').trim().toLowerCase());
    const ci = (label) => headers.findIndex(h => h.includes(label.toLowerCase()));

    rows = dataRows.map(row => {
      const c = row.c || [];
      const get = (i) => (i >= 0 && c[i] && c[i].v != null) ? String(c[i].v).trim() : '';
      return {
        timestamp:   get(ci('timestamp')),
        name:        get(ci('your name'))        || 'Anonymous',
        email:       get(ci('your email')),
        version:     get(ci('app version')),
        summary:     get(ci('summary')),
        type:        get(ci('type')),
        priority:    get(ci('priority')),
        frequency:   get(ci('how often')),
        expected:    get(ci('expected')),
        actual:      get(ci('actual')),
        steps:       get(ci('steps')),
        browser:     get(ci('browser')),
        context:     get(ci('additional context')),
        problem:     get(ci('problem does this solve')),
        useCase:     get(ci('use case')),
        workaround:  get(ci('workaround')),
        impact:      get(ci('impact')),
        urgency:     get(ci('urgency')),
        nps:         get(ci('recommend')),
        satisfaction:get(ci('satisfaction')),
        ease:        get(ci('easy')),
        features:    get(ci('features you needed')),
        useAgain:    get(ci('use undrift again')),
        sessionType: get(ci('session type')),
        teamSize:    get(ci('team size')),
        almostQuit:  get(ci('almost quit')),
        delight:     get(ci('delight')),
        comments:    get(ci('additional comments')),
      };
    }).filter(r => r.summary || r.type); // filter out empty rows

    document.getElementById('lastRefresh').textContent = 'Updated ' + new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    render();
  } catch(e) {
    showError('Could not load the Google Sheet. Make sure sharing is set to "Anyone with the link → Viewer." (' + e.message + ')');
    document.getElementById('cardGrid').innerHTML = '';
  } finally {
    btn.classList.remove('spinning');
  }
}

function getFiltered() {
  const q    = document.getElementById('searchInput')?.value.toLowerCase() || '';
  const sort = document.getElementById('sortSel')?.value || 'newest';
  let result = [...rows];

  const isPriFilter = ['Critical','High','Medium','Low'].includes(activeFilter);
  if (isPriFilter)           result = result.filter(r => r.priority === activeFilter);
  else if (activeFilter === 'bug')     result = result.filter(r => r.type?.toLowerCase().includes('bug'));
  else if (activeFilter === 'feature') result = result.filter(r => r.type?.toLowerCase().includes('feature'));
  else if (activeFilter === 'general') result = result.filter(r => r.type?.toLowerCase().includes('general'));

  if (q) result = result.filter(r =>
    [r.summary,r.name,r.type,r.priority,r.actual,r.problem,r.delight,r.almostQuit,r.comments].join(' ').toLowerCase().includes(q)
  );

  result.sort((a,b) => {
    if (sort === 'priority') return (PRIORITY_ORDER[a.priority]??9)-(PRIORITY_ORDER[b.priority]??9);
    if (sort === 'oldest')   return parseDate(a.timestamp)-parseDate(b.timestamp);
    return parseDate(b.timestamp)-parseDate(a.timestamp);
  });
  return result;
}

function render() {
  const bugs     = rows.filter(r=>r.type?.toLowerCase().includes('bug')).length;
  const features = rows.filter(r=>r.type?.toLowerCase().includes('feature')).length;
  const general  = rows.filter(r=>r.type?.toLowerCase().includes('general')).length;
  const critical = rows.filter(r=>r.priority==='Critical').length;
  const npsRows  = rows.filter(r=>r.nps && !isNaN(parseInt(r.nps)));
  const nps      = calcNPS(npsRows);

  document.getElementById('sTotal').textContent    = rows.length;
  document.getElementById('sBugs').textContent     = bugs;
  document.getElementById('sFeatures').textContent = features;
  document.getElementById('sGeneral').textContent  = general;
  document.getElementById('sCritical').textContent = critical;
  const npsEl = document.getElementById('sNPS');
  npsEl.textContent = npsRows.length ? nps : '—';
  npsEl.style.color = nps >= 40 ? 'var(--green)' : nps >= 0 ? 'var(--amber)' : 'var(--red)';

  const filtered = getFiltered();
  const grid = document.getElementById('cardGrid');

  if (!rows.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">💬</div><p>No responses yet — or make sure the sheet is shared publicly.</p></div>';
    return;
  }
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>No results match this filter.</p></div>';
    return;
  }

  grid.innerHTML = filtered.map(r => {
    const tc = typeClass(r.type);
    const pc = priorityClass(r.priority);
    const body = r.type?.toLowerCase().includes('bug')
      ? (r.actual || r.summary)
      : r.type?.toLowerCase().includes('feature')
        ? (r.problem || r.summary)
        : (r.comments || r.delight || r.almostQuit || '');
    const idx = rows.indexOf(r);
    return `<div class="card" onclick="openDetail(${idx})">
      <div class="card-top">
        <div class="card-left">
          <div class="card-summary">${esc(r.summary||'(no summary)')}</div>
          <div class="card-meta">
            <span>${esc(r.name)}</span>
            ${r.timestamp?`<span>${formatDate(r.timestamp)}</span>`:''}
            ${r.version?`<span>${esc(r.version)}</span>`:''}
          </div>
        </div>
        <div class="card-badges">
          ${r.type?`<span class="badge ${tc}">${esc(r.type)}</span>`:''}
          ${r.priority?`<span class="badge ${pc}">${esc(r.priority)}</span>`:''}
        </div>
      </div>
      ${body?`<div class="card-body">${esc(body)}</div>`:''}
    </div>`;
  }).join('');
}

function openDetail(idx) {
  const r = rows[idx];
  if (!r) return;
  document.getElementById('dTitle').textContent = r.summary || '(no summary)';
  document.getElementById('dBadges').innerHTML = [
    r.type    ?`<span class="badge ${typeClass(r.type)}">${esc(r.type)}</span>`:'',
    r.priority?`<span class="badge ${priorityClass(r.priority)}">${esc(r.priority)}</span>`:'',
    r.version ?`<span class="badge" style="color:var(--muted);border-color:var(--border2)">${esc(r.version)}</span>`:'',
  ].join('');

  const isBug     = r.type?.toLowerCase().includes('bug');
  const isFeature = r.type?.toLowerCase().includes('feature');

  let sections = [['Submitted by', r.name+(r.email?' · '+r.email:'')]];
  if (r.timestamp) sections.push(['Date', formatDate(r.timestamp)]);

  if (isBug) {
    if (r.actual)     sections.push(['What happened', r.actual]);
    if (r.expected)   sections.push(['Expected behavior', r.expected]);
    if (r.steps)      sections.push(['Steps to reproduce', r.steps]);
    if (r.frequency)  sections.push(['How often', r.frequency]);
    if (r.browser)    sections.push(['Browser & OS', r.browser]);
    if (r.context)    sections.push(['Additional context', r.context]);
  } else if (isFeature) {
    if (r.problem)    sections.push(['Problem it solves', r.problem]);
    if (r.useCase)    sections.push(['Use case', r.useCase]);
    if (r.workaround) sections.push(['Current workaround', r.workaround]);
    if (r.impact)     sections.push(['Impact on workflow', r.impact]);
    if (r.urgency)    sections.push(['Urgency', r.urgency]);
  } else {
    if (r.nps)          sections.push(['NPS score', r.nps+'/10']);
    if (r.satisfaction) sections.push(['Overall satisfaction', r.satisfaction]);
    if (r.ease)         sections.push(['Ease of use', r.ease]);
    if (r.features)     sections.push(['Had features needed', r.features]);
    if (r.useAgain)     sections.push(['Would use again', r.useAgain]);
    if (r.sessionType)  sections.push(['Session type', r.sessionType]);
    if (r.teamSize)     sections.push(['Team size', r.teamSize]);
    if (r.delight)      sections.push(['What delighted them', r.delight]);
    if (r.almostQuit)   sections.push(['What almost made them quit', r.almostQuit]);
    if (r.comments)     sections.push(['Additional comments', r.comments]);
  }

  document.getElementById('dBody').innerHTML = sections.map(([l,v])=>`
    <div><div class="detail-label">${l}</div><div class="detail-value">${esc(v)}</div></div>
  `).join('');
  document.getElementById('detailModal').classList.add('open');
}
function closeDetail(){ document.getElementById('detailModal').classList.remove('open'); }
function setFilter(val,el){ activeFilter=val; document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active')); el.classList.add('active'); render(); }
function typeClass(t){ if(!t) return ''; const l=t.toLowerCase(); if(l.includes('bug')) return 'b-bug'; if(l.includes('feature')) return 'b-feature'; if(l.includes('general')) return 'b-general'; return ''; }
function priorityClass(p){ switch(p){ case 'Critical':return 'b-critical'; case 'High':return 'b-high'; case 'Medium':return 'b-medium'; case 'Low':return 'b-low'; default:return ''; } }
function calcNPS(r){ if(!r.length) return null; const p=r.filter(x=>parseInt(x.nps)>=9).length; const d=r.filter(x=>parseInt(x.nps)<=6).length; return Math.round(((p-d)/r.length)*100); }
function parseDate(s){ const d=new Date(s); return isNaN(d)?0:d.getTime(); }
function formatDate(s){ if(!s) return ''; const d=new Date(s); if(isNaN(d)) return s; return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showError(m){ const e=document.getElementById('errorMsg'); e.textContent=m; e.style.display='block'; }
function hideError(){ document.getElementById('errorMsg').style.display='none'; }

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeDetail(); });
document.getElementById('detailModal').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeDetail(); });

loadData();
</script>
